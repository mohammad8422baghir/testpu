name: Auto Update VPN Servers

on:
  schedule:
    # اجرا در دقیقه 0 هر 2 ساعت (مثلا 00:00, 02:00, 04:00 و ...)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # اجازه اجرای دستی از پنل گیت‌هاب

jobs:
  update-servers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          # فعال کردن اکستنشن‌های لازم
          extensions: curl, mbstring

      - name: Run PHP Script
        run: php update_servers.php

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن تمام فایل‌ها و پوشه‌های ساخته شده
          git add .
          
          # کامیت کردن (اگر تغییری نباشد ارور نمی‌دهد)
          git commit -m "Auto-update VPN servers list (3 Methods)" || exit 0
          
          # پوش کردن تغییرات به مخزن
          git push
